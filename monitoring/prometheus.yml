global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: dtq-control-plane
    static_configs:
      - targets: ["api:8000"]
        labels:
          component: api

  - job_name: dtq-workers
    static_configs:
      - targets: ["worker-1:9100", "worker-2:9100"]
        labels:
          component: worker
